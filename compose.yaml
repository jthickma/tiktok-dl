services:
  tiktok-dl:
    build: .
    container_name: tiktok-dl
    restart: unless-stopped
    environment:
      # Cron schedule: every 6 hours
      CRON_SCHEDULE: "0 */6 * * *"
      # yt-dlp output template
      OUTPUT_TEMPLATE: "%(uploader)s/%(upload_date)s - %(title).80B [%(id)s].%(ext)s"
      # Max downloads per channel per run (0 = unlimited)
      MAX_DOWNLOADS: "0"
      # TZ for cron schedule
      TZ: America/Chicago
    volumes:
      # Config files. channels.txt and archive.txt are created on startup if missing.
      - ./config:/config
      # Optional cookies file for authentication
      # - ./config/cookies.txt:/config/cookies.txt:ro
      # Downloaded videos output
      - ./downloads:/downloads
      # Persistent logs
      - ./logs:/logs
    ports:
      - "8080:8080"
    labels:
       proxy.aliases: tiktok-dl.jickman.cc
